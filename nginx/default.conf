# ==============================================
# WebShelf Nginx Configuration
# ==============================================
# This file is shared between Docker and docker-compose deployments.
#
# Docker build: COPY'd into the image at build time
# Docker Compose: mounted as a volume for runtime override
#
# To customize without rebuilding the image, edit this file and restart:
#   docker compose restart webshelf-web
# ==============================================

upstream backend {
    server webshelf-server:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Limit request body size (prevents DoS via oversized payloads)
    client_max_body_size 10m;

    # ------------------------------------------
    # Gzip compression
    # ------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml;

    # Serve .wasm files with correct MIME type (required by some browsers)
    types {
        application/wasm wasm;
    }

    # ------------------------------------------
    # Rate limiting — protect login endpoint from brute force
    # ------------------------------------------
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    # General API rate limit — prevent resource exhaustion (60 req/min per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_status 429;

    # ------------------------------------------
    # Security headers
    # ------------------------------------------
    # NOTE: HSTS is included here so it's ready when HTTPS is enabled.
    # Browsers ignore HSTS on HTTP connections (RFC 6797) — this is safe.
    # To enable HTTPS, uncomment the TLS section in k8s/ingress.yml and
    # set ssl-redirect to "true".
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;

    # ------------------------------------------
    # API reverse proxy → backend server
    # ------------------------------------------

    # Auth endpoints — stricter rate limiting to prevent brute force
    location /api/public/auth/ {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # General API endpoints
    location /api/ {
        # General rate limit: 60 req/min with burst of 10
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Preserve client information
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection keepalive to upstream
        proxy_set_header Connection "";

        # Timeout configuration
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ------------------------------------------
    # Static assets - cache in browser
    # ------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Re-declare security headers (nginx child add_header overrides parent)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;
        access_log off;
        try_files $uri =404;
    }

    # ------------------------------------------
    # SPA fallback - all other routes → index.html
    # ------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------
    # Health check endpoint for nginx itself
    # ------------------------------------------
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ------------------------------------------
    # Deny access to hidden files
    # ------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
