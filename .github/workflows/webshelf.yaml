name: webshelf-ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ========================================
  # Backend - Server CI
  # ========================================
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: webshelf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # NOTE: CI Redis runs without password authentication, unlike
      # docker-compose / K8s which use requirepass. CI tests that need
      # Redis should use a non-auth connection URL (redis://localhost:6379).

    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "server"
    - name: Setup Configuration
      run: |
        mv config.toml.example config.toml
        # CI Redis runs without password — override to ensure no-auth connection
        echo "WEBSHELF_REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
        # CI PostgreSQL uses password 'password' as configured in the service
        echo "WEBSHELF_DATABASE_URL=postgres://postgres:password@localhost:5432/webshelf" >> $GITHUB_ENV
    - name: Format Check
      run: cargo fmt --check
    - name: Lint (Clippy)
      run: cargo clippy --package webshelf-server -- -D warnings
    - name: Build Server
      run: cargo build --package webshelf-server --verbose
    - name: Run Server Tests
      run: cargo test --package webshelf-server --verbose

  # ========================================
  # Frontend - Web CI
  # ========================================
  web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "web"
    - name: Install wasm32 target
      run: rustup target add wasm32-unknown-unknown
    - name: Install cargo-binstall
      uses: cargo-bins/cargo-binstall@main
    - name: Install dioxus-cli
      run: cargo binstall dioxus-cli --version 0.7.9 -y --force
    - name: Verify dx installation
      run: |
        echo "Cargo bin directory: $HOME/.cargo/bin"
        ls -la $HOME/.cargo/bin/ | grep dx || echo "dx not found in cargo/bin"
        which dx || echo "dx not in PATH"
        if [ -f "$HOME/.cargo/bin/dx" ]; then
          echo "dx found at: $HOME/.cargo/bin/dx"
          $HOME/.cargo/bin/dx --version
        else
          echo "ERROR: dx binary not found, installing via cargo install as fallback"
          cargo install dioxus-cli --version 0.7.9
        fi
    - name: Run Web Tests
      run: cargo test --package webshelf-web --verbose
    - name: Build Web
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        cd web && dx build --release
