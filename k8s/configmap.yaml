apiVersion: v1
kind: ConfigMap
metadata:
  name: webshelf-config
  namespace: webshelf
data:
  config.toml: |
    # WebShelf Configuration File
    
    # Database connection URL (PostgreSQL)
    # NOTE: database_url is stored in K8s Secret (webshelf-secrets), not ConfigMap
    # It is injected via secretKeyRef in the Deployment env
    
    # Redis connection URL (for distributed locking only)
    # NOTE: redis_url is stored in K8s Secret (webshelf-secrets), not ConfigMap
    # It is injected via secretKeyRef in the Deployment env
    
    # JWT secret key for token signing
    # NOTE: jwt_secret is stored in K8s Secret (webshelf-secrets), not ConfigMap
    # It is injected via secretKeyRef in the Deployment env
    
    # JWT token expiration time in seconds (default: 1 hour)
    jwt_expiry_seconds = 3600
    
    # Server configuration
    [server]
    host = "0.0.0.0"
    port = 3000
    # Allowed CORS origins
    # NOTE: In K8s, the nginx sidecar handles reverse proxy, so same-origin
    # requests may not need this. Set only if direct browser-to-API access is needed.
    # allowed_origins = ["https://example.com"]
    
    # Database connection pool configuration
    [database]
    max_connections = 10
    min_connections = 1

  # ------------------------------------------
  # Individual keys for env var injection
  # (used by Deployment envFrom / configMapKeyRef)
  # NOTE: database_url and redis_url are in Secret, not here
  # ------------------------------------------
