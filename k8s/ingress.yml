apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webshelf-ingress
  namespace: webshelf
  annotations:
    # Set to "true" after deploying TLS certificates (see tls section below)
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  # ==========================================
  # TLS configuration (uncomment to enable HTTPS)
  #
  # Prerequisites:
  # 1. Create a TLS secret:
  #      kubectl create secret tls webshelf-tls \
  #        --cert=/path/to/cert.pem \
  #        --key=/path/to/key.pem \
  #        -n webshelf
  # 2. Or use cert-manager to auto-provision Let's Encrypt certificates.
  # ==========================================
  # tls:
  # - hosts:
  #   - webshelf.local
  #   secretName: webshelf-tls
  rules:
  - host: webshelf.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: webshelf-web-service
            port:
              number: 80
