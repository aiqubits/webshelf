apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: webshelf
  labels:
    app: redis
spec:
  serviceName: redis-service
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      # Ensure /data directory is writable by UID 999.
      # The redis:7-alpine image ships with /data owned by root;
      # fsGroup alone may not suffice if the PVC was created
      # without group-writable permissions.
      initContainers:
      - name: ensure-data-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 999:999 /data"]
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
      containers:
      - name: redis
        image: redis:7-alpine
        command:
          - redis-server
          - --requirepass
          - $(REDIS_PASSWORD)
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webshelf-secrets
              key: redis_password
        - name: REDISCLI_AUTH
          valueFrom:
            secretKeyRef:
              name: webshelf-secrets
              key: redis_password
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          # REDISCLI_AUTH is already set via env (line 35-39),
          # avoiding -a flag which would expose password in /proc/*/cmdline
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          # REDISCLI_AUTH is already set via env (line 35-39),
          # avoiding -a flag which would expose password in /proc/*/cmdline
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: webshelf
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: webshelf
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
