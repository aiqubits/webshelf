apiVersion: apps/v1
kind: Deployment
metadata:
  name: webshelf
  namespace: webshelf
  labels:
    app: webshelf
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webshelf
  template:
    metadata:
      labels:
        app: webshelf
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: webshelf
        image: webshelf-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: WEBSHELF_ENV
          value: "production"
        - name: RUST_LOG
          value: "info"
        - name: WEBSHELF_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: webshelf-secrets
              key: database_url
        # Read replica URLs (comma-separated, optional)
        # Set when PostgreSQL read replicas are deployed.
        - name: WEBSHELF_DATABASE_READ_URLS
          value: ""
        - name: WEBSHELF_REDIS_URL
          valueFrom:
            secretKeyRef:
              name: webshelf-secrets
              key: redis_url
        - name: WEBSHELF_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: webshelf-secrets
              key: jwt_secret
        - name: WEBSHELF_SYSTEM_ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: webshelf-secrets
              key: system_admin_email
        - name: WEBSHELF_SYSTEM_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webshelf-secrets
              key: system_admin_password
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.toml
          subPath: config.toml
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config-volume
        configMap:
          name: webshelf-config
---
apiVersion: v1
kind: Service
metadata:
  name: webshelf-service
  namespace: webshelf
spec:
  selector:
    app: webshelf
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
